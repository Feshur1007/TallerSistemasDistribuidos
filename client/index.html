<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Game - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <header class="theme-header">
            <div class="logo-box">DS</div>
            <div class="header-text">
                <h1>Architect Console</h1>
                <p class="subtitle">Distributed Identity & Sessions</p>
            </div>
        </header>

        <main id="auth-forms">
            <section id="login-section">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required placeholder="mario_88">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                    <p class="toggle-text">Don't have an account? <a href="#" id="show-register">Register here</a></p>
                </form>
            </section>

            <section id="register-section" class="hidden">
                <h2>Register</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" required placeholder="new_player">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-success">Create Account</button>
                    <p class="toggle-text">Already have an account? <a href="#" id="show-login">Login here</a></p>
                </form>
            </section>
        </main>

        <div id="message-container"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
